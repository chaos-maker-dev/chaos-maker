name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Setup
        uses: ./.github/actions/setup
        with:
          frozen-lockfile: 'true'
          skip-puppeteer-download: 'true'

      - name: Lint
        run: bun run lint

      - name: Unit Tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e-tests/playwright/package.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e-tests/playwright
        run: bunx playwright install --with-deps

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: e2e-tests/playwright
        run: bunx playwright install-deps

      - name: Playwright E2E Tests
        working-directory: e2e-tests/playwright
        run: bunx playwright test

      - name: Cache Cypress Binary
        id: cypress-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ hashFiles('bun.lock') }}

      - name: Install Cypress Binary
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        working-directory: e2e-tests/cypress
        run: bunx cypress install

      - name: Cypress E2E Tests
        working-directory: e2e-tests/cypress
        run: bunx cypress run --browser chrome

      - name: WebdriverIO E2E Tests
        env:
          WDIO_BROWSER: chrome
        run: bun --filter e2e-tests-webdriverio test

      - name: Cache Puppeteer Chrome
        id: puppeteer-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ hashFiles('e2e-tests/puppeteer/package.json', 'bun.lock') }}

      - name: Install Puppeteer Chrome
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
        working-directory: e2e-tests/puppeteer
        run: bunx puppeteer browsers install chrome

      - name: Puppeteer E2E Tests
        run: bun --filter e2e-tests-puppeteer test

  publish-core:
    name: Publish @chaos-maker/core
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Core
        run: bun run build:core

      - name: Publish Core
        run: npm --workspace packages/core publish --no-git-checks --access public

  publish-playwright:
    name: Publish @chaos-maker/playwright
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Playwright
        run: bun run build:core && bun run build:playwright

      - name: Publish Playwright Adapter
        run: npm --workspace packages/playwright publish --no-git-checks --access public

  publish-cypress:
    name: Publish @chaos-maker/cypress
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Cypress
        run: bun run build:core && bun run build:cypress

      - name: Publish Cypress Adapter
        run: npm --workspace packages/cypress publish --no-git-checks --access public

  publish-webdriverio:
    name: Publish @chaos-maker/webdriverio
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build WebdriverIO
        run: bun run build:core && bun run build:webdriverio

      - name: Publish WebdriverIO Adapter
        run: npm --workspace packages/webdriverio publish --no-git-checks --access public

  publish-puppeteer:
    name: Publish @chaos-maker/puppeteer
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Puppeteer
        run: bun run build:core && bun run build:puppeteer

      - name: Publish Puppeteer Adapter
        run: npm --workspace packages/puppeteer publish --no-git-checks --access public
