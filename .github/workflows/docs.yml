name: Docs

on:
  # Production deploys only fire on release tag pushes. Main pushes used to
  # trigger a redeploy too, but that collided with tag-triggered deploys at
  # the same SHA: GitHub Pages dedupes by `pages_build_version` (= commit
  # SHA), so the second deploy was reported successful but never published.
  # `workflow_dispatch` covers ad-hoc redeploys for infra/theme/script
  # changes that ship between tags.
  push:
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch tags
        run: git fetch --tags --force origin

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      # PRs validate the branch's working-tree docs alongside tag archives so
      # that broken mdx/frontmatter/imports fail review. The published site is
      # tag-only, so tag-push and workflow_dispatch builds skip the `--dev`
      # overlay and never include `/main/` in the deployable artifact.
      - name: Build Docs (PR preview, working tree + tags)
        if: github.event_name == 'pull_request'
        run: bun --filter chaos-maker-docs build:dev

      - name: Build Docs (production, tag-only)
        if: github.event_name != 'pull_request'
        run: bun --filter chaos-maker-docs build

      # Validates per-version sidebar isolation, internal-link rewriting,
      # pagination scope, version-selector rendering, and that `latest/`
      # tracks the newest stable git tag. Runs against whichever build
      # produced docs/dist/ above.
      - name: Validate Docs Versioning
        run: bun --filter chaos-maker-docs test:versions

      - name: Upload PR Preview Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docs-dist
          path: docs/dist

      - name: Upload Pages Artifact
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: docs/dist

  deploy:
     name: Docs Deploy
     if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
     needs: build
     runs-on: ubuntu-latest
     permissions:
       pages: write
       id-token: write
       environment:
         name: github-pages
         url: ${{ steps.deployment.outputs.page_url }}
     steps:
       - name: Deploy to GitHub Pages
         id: deployment
         uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
