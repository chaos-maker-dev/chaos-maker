name: Setup Bun + Node + install
description: Checkout assumed already done by caller
inputs:
  frozen-lockfile:
    description: Pass --frozen-lockfile to bun install
    required: false
    default: 'false'
  skip-puppeteer-download:
    description: Set PUPPETEER_SKIP_DOWNLOAD=true
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
    - name: Cache Bun dependencies
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-
    - shell: bash
      env:
        PUPPETEER_SKIP_DOWNLOAD: ${{ inputs.skip-puppeteer-download == 'true' && 'true' || '' }}
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          bun install --frozen-lockfile
        else
          bun install
        fi