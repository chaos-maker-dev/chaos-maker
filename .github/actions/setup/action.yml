name: Setup Bun + Node + install
description: Checkout assumed already done by caller
inputs:
  frozen-lockfile:
    description: Pass --frozen-lockfile to bun install
    required: false
    default: 'false'
  skip-puppeteer-download:
    description: Set PUPPETEER_SKIP_DOWNLOAD=true
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      with:
        bun-version-file: 'package.json'
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version-file: '.nvmrc'
    - name: Cache Bun dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-
    - shell: bash
      env:
        PUPPETEER_SKIP_DOWNLOAD: ${{ inputs.skip-puppeteer-download == 'true' && 'true' || '' }}
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          bun install --frozen-lockfile
        else
          bun install
        fi